spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                # Frontend Vite app can call the gateway from these origins.
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5173"
                  - "http://localhost:5174"
                  - "http://127.0.0.1:5174"
                  - "http://localhost:3000"
                  - "http://127.0.0.1:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                allowCredentials: true
      default-filters:
        # If both gateway and downstream service add the same CORS header,
        # this filter keeps the browser response clean and prevents duplicates.
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

server:
  port: ${GATEWAY_SERVICE_PORT:8080}

services:
  auth:
    # Gateway forwards auth-service traffic to this base URL.
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  employee:
    # Gateway forwards employee-service traffic to this base URL.
    url: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
