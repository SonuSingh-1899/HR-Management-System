spring.application.name=hr-management-monolith

server.port=${HR_MANAGEMENT_PORT:8080}

spring.datasource.url=${HR_DATASOURCE_URL:jdbc:postgresql://localhost:5432/HRManagement}
spring.datasource.username=${HR_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${HR_DATASOURCE_PASSWORD:heroic}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

security.jwt.secret-key=${JWT_SECRET:aHItbWFuYWdlbWVudC1kZXYtc2VjcmV0LWtleS0yMDI2LXN1cGVyLXNlY3VyZQ==}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000,http://127.0.0.1:3000}
